<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Ping123 IP checker GitHub preview</title>
  <desc id="desc">A preview card for Ping123, a free IP checker, proxy checker, DNS leak test, WebRTC leak test, and IP risk score tool.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="52%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="80" r="180" fill="#2563eb" opacity="0.16"/>
  <circle cx="120" cy="560" r="210" fill="#7c3aed" opacity="0.18"/>
  <rect x="70" y="72" width="1060" height="486" rx="34" fill="#0b1220" opacity="0.84" filter="url(#shadow)"/>
  <rect x="70" y="72" width="1060" height="8" fill="url(#accent)"/>
  <text x="112" y="152" fill="#93c5fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">ping123.app</text>
  <text x="112" y="238" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="800">What Is My IP?</text>
  <text x="112" y="306" fill="#e5e7eb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">Proxy Checker · DNS Leak Test · WebRTC Leak Test</text>
  <text x="112" y="368" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28">Check public IP, proxy/VPN signals, browser privacy, and IP risk context.</text>
  <g transform="translate(112 424)">
    <rect width="202" height="54" rx="27" fill="#2563eb"/>
    <text x="101" y="36" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Free IP Checker</text>
  </g>
  <g transform="translate(334 424)">
    <rect width="188" height="54" rx="27" fill="#111827" stroke="#334155"/>
    <text x="94" y="36" text-anchor="middle" fill="#e5e7eb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">No Login</text>
  </g>
  <g transform="translate(542 424)">
    <rect width="216" height="54" rx="27" fill="#111827" stroke="#334155"/>
    <text x="108" y="36" text-anchor="middle" fill="#e5e7eb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Manual Checks</text>
  </g>
  <g transform="translate(848 164)">
    <rect x="0" y="0" width="220" height="254" rx="24" fill="#111827" stroke="#334155"/>
    <circle cx="110" cy="70" r="34" fill="#2563eb"/>
    <path d="M93 70h34M110 53v34" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <text x="110" y="138" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">IP Risk</text>
    <text x="110" y="176" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Proxy · VPN</text>
    <text x="110" y="208" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">DNS · WebRTC</text>
  </g>
</svg>
